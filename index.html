<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cofetăria Alexandra | Dulce Artizanal</title>
    <style>
        :root { --bg: #050507; --gold: #D4AF37; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; padding: 0; text-align: center; }
        .hero { padding: 100px 20px; border-bottom: 1px solid var(--gold); }
        h1 { font-size: 3rem; color: var(--gold); margin: 0; }
        .btn { display: inline-block; padding: 15px 30px; background: var(--gold); color: var(--bg); text-decoration: none; border-radius: 8px; margin-top: 20px; font-weight: bold; }
        section { padding: 50px 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Cofetăria Alexandra</h1>
        <p>Arta deserturilor făcute cu pasiune.</p>
        <a href="#contact" class="btn">Comandă Acum</a>
    </div>
    <section id="produse">
        <h2>Produse Artizanale</h2>
        <p>Torturi personalizate, prăjituri fine, candy bar.</p>
    </section>
    <footer id="contact">
        <p>Contact: office@cofetariaalexandra.ro</p>
    </footer>
</body>
</html>
